name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: |
          VERSION=0.13.1
          EXPECTED_SHA256=c539d91ccab2591a7e975bcf82c82e1911b03335c80aa83d67ad25ed2ad06539
          ASSET="wasm-pack-v${VERSION}-x86_64-unknown-linux-musl"
          curl -fsSLO "https://github.com/rustwasm/wasm-pack/releases/download/v${VERSION}/${ASSET}.tar.gz"
          echo "${EXPECTED_SHA256}  ${ASSET}.tar.gz" | sha256sum -c -
          tar -xzf "${ASSET}.tar.gz"
          sudo install -m 0755 "${ASSET}/wasm-pack" /usr/local/bin/wasm-pack

      - name: Build WASM
        run: wasm-pack build --target web --out-dir www/pkg --release

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: www

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
